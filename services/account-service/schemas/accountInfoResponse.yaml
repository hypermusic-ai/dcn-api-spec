# SPDX-License-Identifier: MIT

title: AccountInfoResponse
type: object
additionalProperties: false
required:
  [
    address,
    limit,
    owned_connectors,
    owned_transformations,
    owned_conditions,
    cursor_connectors,
    cursor_transformations,
    cursor_conditions,
  ]
description: Cursor-based account ownership response.

properties:
  address:
    $ref: ../../../shared/schemas/address.yaml

  limit:
    type: integer
    minimum: 1
    maximum: 256
    description: Page size used for this response.

  owned_connectors:
    type: array
    items:
      type: string
    description: Owned connector names.

  owned_transformations:
    type: array
    items:
      type: string
    description: Owned transformation names.

  owned_conditions:
    type: array
    items:
      type: string
    description: Owned condition names.

  cursor_connectors:
    $ref: "nameCursorState.yaml"

  cursor_transformations:
    $ref: "nameCursorState.yaml"

  cursor_conditions:
    $ref: "nameCursorState.yaml"
