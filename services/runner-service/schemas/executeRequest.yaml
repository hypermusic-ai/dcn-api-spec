# SPDX-License-Identifier: MIT

title: ExecuteRequest
type: object
additionalProperties: false
required: [connector_name, particles_count]
description: Execute request payload.

properties:
  connector_name:
    type: string
    description: Connector name to execute.

  particles_count:
    oneOf:
      - type: integer
        minimum: 0
        maximum: 65536
      - type: string
        pattern: "^(0|[1-9][0-9]*)$"
    description: >
      Number of particles to generate. The backend accepts protobuf JSON uint32
      values and rejects values greater than 65536.

  dynamic_ri:
    type: object
    additionalProperties:
      $ref: "runningInstance.yaml"
    description: >
      Dynamic running-instance overrides keyed by canonical decimal RI position.
      Omitted means no overrides.
