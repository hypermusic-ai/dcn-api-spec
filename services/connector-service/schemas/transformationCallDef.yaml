title: TransformationCallDef
type: object
additionalProperties: false
required: [name]
description: Transformation invocation in a connector dimension.

properties:
  name:
    type: string
    description: Transformation name

  args:
    type: array
    items:
      type: integer
    description: Transformation arguments. Omitted means no arguments.
