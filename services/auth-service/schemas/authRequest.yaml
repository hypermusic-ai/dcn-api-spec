title: AuthRequest
type: object
additionalProperties: false
required: [address, message, signature]
description: Auth request.

properties:
  address: { $ref: ../../../shared/schemas/address.yaml }

  message:
    type: string
    description: >
      Login message signed by the account owner. Must be
      `Login nonce: <nonce>`.

  signature:
    type: string
    description: Wallet signature of the login message.
