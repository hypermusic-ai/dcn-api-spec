# SPDX-License-Identifier: MIT

title: AccountListResponse
type: object
additionalProperties: false
required: [limit, total_accounts, cursor, accounts]
description: Cursor-based account list response.

properties:
  limit:
    type: integer
    minimum: 1
    maximum: 256
    description: Page size used for this response.

  total_accounts:
    type: integer
    minimum: 0
    description: Total number of known accounts.

  cursor:
    $ref: "accountAddressCursorState.yaml"

  accounts:
    type: array
    items:
      $ref: "../../../shared/schemas/address.yaml"
    description: Account addresses in ascending cursor order.
