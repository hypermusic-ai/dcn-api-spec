# SPDX-License-Identifier: MIT

title: ConnectorDimension
type: object
additionalProperties: false
required: [transformations]
description: Single connector dimension definition.

properties:
  transformations:
    type: array
    items:
      $ref: "transformationCallDef.yaml"
    description: Ordered transformation calls for this dimension.

  composite:
    type: string
    description: Connected composite connector name. Omitted or empty string means none.

  bindings:
    type: object
    additionalProperties:
      type: string
    description: >
      Slot bindings map for composite connectors. Omitted means no bindings.
      Keys are canonical decimal slot ids and values are connector names.
