# SPDX-License-Identifier: MIT

title: ExecuteRequest
type: object
additionalProperties: false
required: [connector_name, particles_count, dynamic_ri]
description: Execute request payload.

properties:
  connector_name:
    type: string
    description: Connector name to execute.

  particles_count:
    type: integer
    minimum: 1
    maximum: 65536
    description: Number of particles to generate.

  dynamic_ri:
    type: object
    additionalProperties:
      $ref: "runningInstance.yaml"
    description: >
      Dynamic running-instance overrides keyed by canonical decimal RI position.
