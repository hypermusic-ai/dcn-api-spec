title: FormatNameCursorState
type: object
additionalProperties: false
required: [has_more, next_after]
description: Cursor state for connector names within one format.

properties:
  has_more:
    type: boolean
    description: Indicates whether more connector names are available.

  next_after:
    type: string
    nullable: true
    description: Connector name cursor for the next page, or null when exhausted.
