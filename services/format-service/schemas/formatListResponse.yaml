# SPDX-License-Identifier: MIT

title: FormatListResponse
type: object
additionalProperties: false
required: [limit, total_formats, cursor, formats]
description: Cursor-based format hash list response.

properties:
  limit:
    type: integer
    minimum: 1
    maximum: 256
    description: Page size used for this response.

  total_formats:
    type: integer
    minimum: 0
    description: Total number of known format hashes.

  cursor:
    $ref: "formatHashCursorState.yaml"

  formats:
    type: array
    items:
      $ref: "formatHash.yaml"
    description: Format hashes in ascending cursor order.
